name: Minecraft Server Auto Builder

on:
  repository_dispatch:
    types: [create_server]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout mã nguồn
      uses: actions/checkout@v4

    - name: Cài đặt Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Cài đặt các thư viện cần thiết
      run: |
        pip install google-genai requests

    - name: Chạy Script AI để chọn và tải Plugin
      env:
        AI_API_KEY: ${{ secrets.AI_API_KEY }}
      run: |
        python generate_server.py "${{ github.event.client_payload.idea }}" "${{ github.event.client_payload.version }}"

    - name: Đóng gói các Plugin thành file ZIP
      run: |
        if [ -d "plugins" ] && [ "$(ls -A plugins)" ]; then
          zip -r minecraft-server.zip plugins/
        else
          echo "Không có plugin nào được tải xuống để nén."
          exit 1
        fi

    - name: Tải file ZIP lên Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: server-plugins-${{ github.event.client_payload.version }}
        path: minecraft-server.zip
        
