<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình tạo Server Minecraft Tự động</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 40px auto; padding: 20px; line-height: 1.6; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], textarea, select { width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        textarea { height: 100px; resize: vertical; }
        button { background-color: #28a745; color: white; padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background-color: #218838; }
        #status { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
    </style>
</head>
<body>

    <h2>🤖 Trình tạo Server Minecraft Tự động</h2>
    <p>Nhập ý tưởng của bạn, AI sẽ tự động phân tích và tải bộ plugin phù hợp từ Modrinth.</p>

    <div class="form-group">
        <label for="idea">Ý tưởng Server:</label>
        <textarea id="idea" placeholder="Ví dụ: Server sinh tồn SMP có hệ thống kinh tế shop, claim đất bảo vệ và bảng xếp hạng..."></textarea>
    </div>

    <div class="form-group">
        <label for="version">Phiên bản Minecraft:</label>
        <select id="version">
            <option value="1.21">1.21</option>
            <option value="1.20.4">1.20.4</option>
            <option value="1.19.4">1.19.4</option>
            <option value="1.16.5">1.16.5</option>
        </select>
    </div>

    <button onclick="triggerBuild()">🚀 Bắt đầu xây dựng Server</button>

    <div id="status"></div>

    <script>
        async function triggerBuild() {
            const idea = document.getElementById('idea').value;
            const version = document.getElementById('version').value;
            const statusDiv = document.getElementById('status');

            if (!idea.trim()) {
                alert("Vui lòng nhập ý tưởng server của bạn!");
                return;
            }

            statusDiv.style.display = "block";
            statusDiv.className = "success";
            statusDiv.innerText = "⏳ Đang gửi yêu cầu đến GitHub Actions... Vui lòng đợi.";

            const TOKEN = prompt("Bạn vào đây để xác thực:");
            if (!TOKEN) {
                alert("Bạn cần dán Token để trang web có quyền ra lệnh cho hệ thống!");
                return;
            }

            const OWNER = 'anhsung986';
            const REPO = 'sv';

            try {
                const response = await fetch('https://api.github.com/repos/' + OWNER + '/' + REPO + '/dispatches', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'token ' + TOKEN,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        event_type: 'create_server',
                        client_payload: {
                            idea: idea,
                            version: version
                        }
                    })
                });

                if (response.status === 204) {
                    statusDiv.innerHTML = "✅ <b>Yêu cầu thành công!</b> GitHub Actions đang chạy ngầm để tải plugin. Bạn có thể quay lại mục Actions trên GitHub để xem.";
                } else {
                    const errData = await response.json();
                    statusDiv.innerText = "❌ Thất bại: " + JSON.stringify(errData);
                }
            } catch (error) {
                statusDiv.innerText = "❌ Lỗi kết nối: " + error.message;
            }
        }
    </script>
</body>
</html>
