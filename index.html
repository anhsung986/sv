<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Server Auto Builder</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 50px auto; padding: 20px; line-height: 1.6; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; }
        input[type="text"], select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        textarea { height: 100px; resize: vertical; }
        button { background-color: #2da44e; color: white; padding: 12px 20px; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; width: 100%; }
        button:hover { background-color: #2c974b; }
        #status { margin-top: 20px; padding: 15px; border-radius: 4px; display: none; }
        .success { background-color: #dafbe1; color: #1a7f37; border: 1px solid #4ac26b; }
    </style>
</head>
<body>

    <h2>🤖 Trình tạo Server Minecraft Tự động</h2>
    <p>Nhập ý tưởng của bạn, AI sẽ tự động phân tích và tải bộ plugin phù hợp từ Modrinth.</p>

    <div class="form-group">
        <label for="idea">Ý tưởng Server:</label>
        <textarea id="idea" placeholder="Ví dụ: Server sinh tồn khốc liệt tận thế zombie, có hệ thống súng và kinh tế giao thương..."></textarea>
    </div>

    <div class="form-group">
        <label for="version">Phiên bản Minecraft:</label>
        <select id="version">
            <option value="1.21">1.21</option>
            <option value="1.20.4">1.20.4</option>
            <option value="1.19.4">1.19.4</option>
            <option value="1.16.5">1.16.5</option>
        </select>
    </div>

    <button onclick="triggerBuild()">🚀 Bắt đầu xây dựng Server</button>

    <div id="status"></div>

    <script>
        async function triggerBuild() {
            const idea = document.getElementById('idea').value;
            const version = document.getElementById('version').value;
            const statusDiv = document.getElementById('status');

            if (!idea.trim()) {
                alert("Vui lòng nhập ý tưởng server của bạn!");
                return;
            }

            statusDiv.style.display = "block";
            statusDiv.className = "success";
            statusDiv.innerText = "⏳ Đang gửi yêu cầu đến GitHub Actions... Vui lòng đợi.";

            // Cấu hình tài khoản GitHub của bạn
            const OWNER = "anhsung986"; 
            const REPO = "sv";
            
            // LƯU Ý: Đoạn này cần một GitHub Personal Access Token (PAT) có quyền 'repo' hoặc 'workflow'
            // Để test nhanh bạn có thể dán tạm token vào đây (nhưng đừng public lộ token nhé!)
            const TOKEN = prompt(" bạn vào đây để xác thực:");
            if (!TOKEN) {
                alert("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");
                return;
            }

            try {
                const response = await fetch(`https://api.github.com/repos/${OWNER}/${REPO}/dispatches`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `token ${TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        event_type: 'create_server', // Khớp với file .github/workflows/main.yml
                        client_payload: {
                            idea: idea,
                            version: version
                        }
                    })
                });

                if (response.status === 204) {
                    statusDiv.innerText = "✅ Yêu cầu thành công! GitHub Actions đang chạy ngầm để tải plugin. Bạn có thể vào tab 'Hành động' (Actions) trên GitHub để theo dõi và tải file ZIP khi hoàn thành.";
                } else {
                    const errData = await response.json();
                    statusDiv.innerText = "❌ Thất bại: " + JSON.stringify(errData);
                }
            } catch (error) {
                statusDiv.innerText = "❌ Lỗi kết nối: " + error.message;
            }
        }
    </script>
</body>
  </html>
